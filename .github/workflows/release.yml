name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Check tag matches package.json version
        run: |
          PKG=$(bun -e 'console.log((await import("./package.json")).default.version)')
          TAG="${GITHUB_REF_NAME#v}"
          [ "$PKG" = "$TAG" ] || { echo "tag v$TAG does not match package.json version $PKG" >&2; exit 1; }
      - run: bun run test
      # One host cross-compiles every CLI_PLATFORMS target (no native deps).
      - run: bun run build:cli
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/cli/*
          generate_release_notes: true
