<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>mdio</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="app" hidden>
      <aside id="sidebar">
        <div id="brand-row">
          <h1>mdio</h1>
          <button id="settings-open" type="button" class="icon-btn" title="Settings" aria-label="Settings">⚙</button>
        </div>
        <nav id="global-nav">
          <button id="nav-home" type="button" class="nav-item">
            <span class="nav-icon">⌂</span><span class="nav-label">Home</span>
          </button>
          <button id="nav-inbox" type="button" class="nav-item">
            <span class="nav-icon">☰</span><span class="nav-label">Inbox</span>
            <span id="inbox-badge" class="nav-badge" hidden></span>
          </button>
          <button id="nav-search" type="button" class="nav-item">
            <span class="nav-icon">⌕</span><span class="nav-label">Search</span>
            <span class="nav-shortcut">⌘K</span>
          </button>
        </nav>
        <div id="project-section" hidden>
          <div id="project-bar">
            <select id="project-select" title="Switch project"></select>
            <button id="project-new" type="button" title="Create a project">＋ new</button>
            <div id="project-menu" class="menu">
              <button id="project-menu-toggle" type="button" class="menu-toggle" title="Project actions" aria-haspopup="true" aria-expanded="false">⋯</button>
              <ul id="project-menu-list" class="menu-list" hidden>
                <li><button id="project-rename" type="button">Rename project</button></li>
                <li><button id="project-mcp" type="button">Connect an agent…</button></li>
                <li class="menu-divider"></li>
                <li><button id="project-delete" type="button" class="danger">Delete project</button></li>
              </ul>
            </div>
          </div>
          <button id="nav-agents" type="button" class="nav-item">
            <span class="nav-icon">🤖</span><span class="nav-label">Agents</span>
          </button>
          <ul id="doc-list"></ul>
          <button id="doc-new" type="button" title="Create a document in this project">＋ new document</button>
        </div>
        <div id="me" hidden>
          <span id="me-name" class="peer"></span>
          <button id="logout" type="button" title="Forget this name on this browser">log out</button>
        </div>
      </aside>
      <main id="main">
        <header id="header" hidden>
          <div id="doc-identity">
            <span id="status-dot" data-status="disconnected" title="disconnected"></span>
            <nav id="breadcrumb" title="">
              <span id="crumb-project"></span>
              <span class="crumb-sep">/</span>
              <span id="crumb-title"></span>
            </nav>
          </div>
          <div id="presence"></div>
          <div id="mode-toggle" role="group" aria-label="View mode">
            <button id="mode-edit" type="button" class="active" title="Editor only">Edit</button>
            <button id="mode-both" type="button" title="Editor and preview side by side">Both</button>
            <button id="mode-read" type="button" title="Rendered preview only">Read</button>
          </div>
          <div id="doc-menu" class="menu">
            <button id="doc-menu-toggle" type="button" class="menu-toggle" title="Document actions" aria-haspopup="true" aria-expanded="false">⋯</button>
            <ul id="doc-menu-list" class="menu-list" hidden>
              <li><button id="comment-add" type="button" title="Comment on the selected text">＋ comment</button></li>
              <li><button id="history-open" type="button">History</button></li>
              <li><button id="versions-open" type="button">Versions</button></li>
              <li class="menu-divider"></li>
              <li><button id="doc-rename" type="button">Rename</button></li>
              <li><button id="doc-move" type="button">Move…</button></li>
              <li class="menu-divider"></li>
              <li><button id="doc-delete" type="button" class="danger">Delete</button></li>
            </ul>
          </div>
        </header>
        <div id="activity" hidden></div>
        <div id="workspace">
          <div id="editor"></div>
          <div id="preview" hidden></div>
          <aside id="comments-panel" hidden>
            <header id="comments-header">
              <span>Comments</span>
              <label id="comments-filter"
                ><input type="checkbox" id="comments-show-resolved" /> show resolved</label
              >
            </header>
            <div id="comments-list"></div>
          </aside>
          <aside id="suggestions-panel" hidden>
            <header id="suggestions-header">
              <span id="suggestions-title">Suggested edits</span>
              <div id="suggestions-bulk">
                <button id="suggest-accept-all" type="button" class="suggest-btn primary" title="Accept every pending suggestion">Accept all</button>
                <button id="suggest-reject-all" type="button" class="suggest-btn" title="Reject every pending suggestion">Reject all</button>
              </div>
            </header>
            <div id="suggestions-list"></div>
          </aside>
        </div>
        <div id="empty-state" hidden></div>
        <div id="surface" hidden></div>
      </main>
    </div>
    <div id="history" hidden>
      <div id="history-panel">
        <header id="history-toolbar">
          <span id="history-title"></span>
          <button id="history-play" type="button">▶ play</button>
          <input id="history-slider" type="range" min="1" max="1" value="1" />
          <span id="history-pos"></span>
          <button id="history-close" type="button" title="Close history">✕</button>
        </header>
        <div id="history-editor"></div>
      </div>
    </div>
    <div id="versions" hidden>
      <div id="versions-panel">
        <header id="versions-toolbar">
          <span id="versions-title"></span>
          <button id="versions-close" type="button" title="Close versions">✕</button>
        </header>
        <form id="versions-form">
          <input id="versions-label" type="text" placeholder="Name this version…" maxlength="100" />
          <button type="submit" id="versions-save">Save current version</button>
        </form>
        <div id="versions-list"></div>
      </div>
    </div>
    <div id="palette" hidden>
      <div id="palette-panel">
        <input id="palette-input" type="text" placeholder="Search documents, or type a command…" autocomplete="off" spellcheck="false" />
        <div id="palette-results"></div>
      </div>
    </div>
    <div id="dialog" hidden>
      <form id="dialog-panel">
        <h2 id="dialog-title"></h2>
        <p id="dialog-body" hidden></p>
        <input id="dialog-input" autocomplete="off" spellcheck="false" hidden />
        <div id="dialog-choices" hidden></div>
        <div id="dialog-actions">
          <button id="dialog-cancel" type="button">Cancel</button>
          <button id="dialog-confirm" type="submit">OK</button>
        </div>
      </form>
    </div>
    <div id="toast-tray"></div>
    <div id="login" hidden>
      <form id="login-form">
        <div class="login-brand">mdio</div>
        <p class="login-tagline">
          Live markdown for humans and AI agents.<br />
          Your name is what collaborators see.
        </p>
        <input
          id="login-name"
          maxlength="40"
          placeholder="e.g. plosson"
          autocomplete="off"
          spellcheck="false"
        />
        <p id="login-error" hidden></p>
        <button type="submit">Join</button>
      </form>
    </div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
