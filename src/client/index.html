<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>sharemd</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <h1>sharemd</h1>
        <ul id="doc-list"></ul>
        <div id="me" hidden>
          <span id="me-name" class="peer"></span>
          <button id="logout" type="button" title="Forget this name on this browser">log out</button>
        </div>
      </aside>
      <main id="main">
        <header id="header">
          <span id="doc-title">Select a document</span>
          <span id="status" data-status="disconnected">disconnected</span>
          <div id="presence"></div>
        </header>
        <div id="editor"></div>
      </main>
    </div>
    <div id="login" hidden>
      <form id="login-form">
        <h2>Who are you?</h2>
        <p class="login-hint">This name is shown to everyone editing with you.</p>
        <input
          id="login-name"
          maxlength="40"
          placeholder="e.g. plosson"
          autocomplete="off"
          spellcheck="false"
        />
        <p id="login-error" hidden></p>
        <button type="submit">Join</button>
      </form>
    </div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
