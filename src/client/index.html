<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>mdio</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <h1>mdio</h1>
        <div id="project-bar">
          <select id="project-select" title="Switch project"></select>
          <button id="project-new" type="button" title="New project">＋</button>
          <button id="project-rename" type="button" title="Rename this project">✎</button>
          <button id="project-delete" type="button" title="Delete this project and all its documents">🗑</button>
        </div>
        <ul id="doc-list"></ul>
        <button id="doc-new" type="button" title="Create a document in this project">＋ new document</button>
        <div id="me" hidden>
          <span id="me-name" class="peer"></span>
          <button id="logout" type="button" title="Forget this name on this browser">log out</button>
        </div>
      </aside>
      <main id="main">
        <header id="header">
          <span id="doc-title">Select a document</span>
          <span id="status" data-status="disconnected">disconnected</span>
          <div id="presence"></div>
          <button id="comment-add" type="button" title="Comment on the selected text">＋ comment</button>
          <button id="preview-toggle" type="button" title="Toggle rendered markdown preview">preview</button>
          <button id="history-open" type="button" title="Replay this document's edit history">history</button>
          <button id="doc-rename" type="button" title="Rename this document">rename</button>
          <button id="doc-move" type="button" title="Move this document to another project">move</button>
          <button id="doc-delete" type="button" title="Delete this document">delete</button>
        </header>
        <div id="workspace">
          <div id="editor"></div>
          <div id="preview" hidden></div>
          <aside id="comments-panel" hidden>
            <header id="comments-header">
              <span>Comments</span>
              <label id="comments-filter"
                ><input type="checkbox" id="comments-show-resolved" /> show resolved</label
              >
            </header>
            <div id="comments-list"></div>
          </aside>
        </div>
      </main>
    </div>
    <div id="history" hidden>
      <div id="history-panel">
        <header id="history-toolbar">
          <span id="history-title"></span>
          <button id="history-play" type="button">▶ play</button>
          <input id="history-slider" type="range" min="1" max="1" value="1" />
          <span id="history-pos"></span>
          <button id="history-close" type="button" title="Close history">✕</button>
        </header>
        <div id="history-editor"></div>
      </div>
    </div>
    <div id="login" hidden>
      <form id="login-form">
        <h2>Who are you?</h2>
        <p class="login-hint">This name is shown to everyone editing with you.</p>
        <input
          id="login-name"
          maxlength="40"
          placeholder="e.g. plosson"
          autocomplete="off"
          spellcheck="false"
        />
        <p id="login-error" hidden></p>
        <button type="submit">Join</button>
      </form>
    </div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
